# Config LiteLLM di ESEMPIO — minimo ma COMPLETO — che mostra il guardrail presidio
# rizzo-pii nel contesto di un config reale. Copialo come `litellm-config.yaml`
# (o `config.yaml`) e personalizzalo: sostituisci <HOST>, le chiavi (via env) e i modelli.
#
# Stack presidio richiesto (docker/docker-compose.yml):
#   rizzo-analyzer :5002  (modello mmBERT + regex/checksum IT)
#   presidio-anonymizer :5001  (immagine Microsoft ufficiale)
#
# Flusso:
#   utente -> LiteLLM --/analyze--> rizzo-analyzer --/anonymize--> presidio-anonymizer
#          -> testo mascherato -> LLM esterno -> output_parse_pii ricostruisce -> utente

model_list:
  - model_name: preciso
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: rapido
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # mai segreti in chiaro nel file

guardrails:
  # Registrarlo qui (source "config") = dichiarativo, versionabile in git, READ-ONLY nella
  # UI (non sovrascrivibile per sbaglio). In alternativa dalla UI admin (source "db"):
  # comodo, ritoccabile a caldo. Un guardrail vive in UNA sola sorgente, e in ENTRAMBI
  # i casi compare nel Guardrails Monitor / log della UI.
  - guardrail_name: "rizzo-pii-presidio"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      presidio_analyzer_api_base: "http://<HOST>:5002"      # rizzo-analyzer
      presidio_anonymizer_api_base: "http://<HOST>:5001"    # anonymizer MS ufficiale
      presidio_language: "it"
      presidio_filter_scope: "input"    # maschera l'input verso l'LLM (non l'output)
      output_parse_pii: true            # ripristina i valori veri nella risposta (reversibile)

      # Soglie di confidenza PER-ENTITA' (minimo score per accettare una detection).
      # PERCHE': il modello a volte emette detection contestuali a confidenza bassissima
      # (~0.40, testa-o-croce) che diventano falsi positivi -> es. "rizzo-pii" scambiato
      # per una citta' e mascherato. Le detection VERE stanno a ~0.99, quindi 0.6 taglia
      # il rumore senza perdere quelle buone. Si applicano SOLO alle entita' contestuali
      # del modello: il layer regex/checksum (CF/IBAN/carta=1.0, telefono/targa) NON e'
      # toccato e resta sempre attivo.
      #
      # GOTCHA: questo campo la UI admin di LiteLLM NON lo espone nel form presidio
      # (rende solo 6 campi). Va messo qui nel config, oppure via API di management
      # (PUT /guardrails/{id}). Se il guardrail e' nel DB, la UI lo PRESERVA al salvataggio
      # anche se non lo mostra -> nessuna perdita, ma per impostarlo/modificarlo serve
      # config o API. Verificato su LiteLLM v1.88.1.
      presidio_score_thresholds:
        LOCATION: 0.6
        PERSON: 0.6
        ORGANIZATION: 0.6
        DATE_TIME: 0.6
        AGE: 0.6

      # NON impostare pii_entities_config se vuoi le entita' custom italiane.
      # GOTCHA: se lo popoli, LiteLLM invia "entities" all'analyzer e restringe la
      # detection SOLO a quei tipi -> le entita' custom IT_* che non sono nella lista
      # built-in di LiteLLM (IT_CADASTRAL, IT_DOC_ID, IT_PROVINCE, IT_AMOUNT, ...)
      # verrebbero escluse. Lasciandolo vuoto passano tutte.
      # pii_entities_config:
      #   PERSON: "MASK"
      #   IT_FISCAL_CODE: "MASK"
      #   IBAN_CODE: "MASK"

# ---------------------------------------------------------------------------
# QUALI richieste passano dal guardrail: 4 livelli, si SOMMANO
# ---------------------------------------------------------------------------
# 1) GLOBALE   -> default_on: true (sopra). Gira su TUTTO il traffico del proxy.
# 2) PER-RICHIESTA -> nel body: {"guardrails": ["rizzo-pii-presidio"], ...}. Dinamico.
# 3) PER-MODELLO -> guardrails: [...] nei litellm_params del modello (vedi sotto).
# 4) PER-KEY/TEAM -> guardrails: [...] sulla virtual key o sul team.
#
# Per attivarlo SOLO su alcuni modelli (es. in Open WebUI scegli il modello e con
# quello scegli se anonimizzare): metti default_on: false qui sopra, poi attacca il
# guardrail ai singoli modelli nel model_list. LiteLLM legge
# deployment.litellm_params["guardrails"] per il modello scelto e lo applica solo a
# quello; i modelli senza quella riga NON mascherano. Esempio:
#
#   - model_name: preciso                     # <-- maschera
#     litellm_params:
#       model: anthropic/claude-sonnet-4-6
#       api_key: os.environ/ANTHROPIC_API_KEY
#       guardrails: ["rizzo-pii-presidio"]     # <-- la riga chiave
#   - model_name: rapido                       # <-- niente riga guardrails -> NON maschera
#     litellm_params:
#       model: openrouter/deepseek/deepseek-v4-flash
#       api_key: os.environ/OPENROUTER_API_KEY
#
# NB: il modello "tasks" (Open WebUI lo usa per generare titoli/tag delle chat) manda
# il contenuto della conversazione all'LLM -> se lo vuoi protetto, attacca il guardrail
# anche a lui, altrimenti quei riassunti escono NON mascherati.
